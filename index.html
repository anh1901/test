<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Tây Studio - Báo Giá Chuẩn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f7f4; color: #1c1917; }
        .selected-btn { border-color: #92400e !important; background-color: #fffbeb !important; color: #92400e !important; opacity: 1 !important; transform: scale(1.02); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e7e5e4; border-radius: 10px; }
        #modal-overlay.visible { opacity: 1; pointer-events: auto; }
        #modal-content { transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .invisible #modal-content { transform: scale(0.95) translateY(10px); opacity: 0; }
        .visible #modal-content { transform: scale(1) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-stone-200">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-stone-900 rounded-lg flex items-center justify-center text-white"><i class="fas fa-leaf"></i></div>
                <h1 class="font-extrabold text-stone-900 text-lg uppercase tracking-tighter">Me Tây Studio</h1>
            </div>
            <button onclick="openCart()" class="relative p-2 text-stone-600 hover:text-stone-900 transition-colors">
                <i class="fas fa-shopping-cart text-xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-orange-700 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold shadow-md">0</span>
            </button>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-10">
        <div class="mb-8">
            <h2 class="text-3xl font-black text-stone-900 uppercase tracking-tight">Danh mục sản phẩm</h2>
            <p class="text-stone-400 font-semibold text-[10px] uppercase tracking-widest mt-2 flex items-center gap-2">
                <span class="w-8 h-px bg-stone-200"></span> Click vào sản phẩm để xem báo giá chi tiết
            </p>
        </div>
        <div class="grid grid-cols-1 gap-4" id="table-catalog"></div>
    </main>

    <!-- Modal Tùy Chỉnh -->
    <div id="modal-overlay" class="fixed inset-0 z-[60] flex items-center justify-center invisible bg-stone-900/40 backdrop-blur-sm transition-opacity duration-300">
        <div class="absolute inset-0" onclick="hideCustomizer()"></div>
        <div id="modal-content" class="relative w-full max-w-5xl max-h-[92vh] bg-white rounded-[2rem] shadow-2xl overflow-hidden flex flex-col md:flex-row m-4">
            
            <!-- Ảnh & Thông số -->
            <div class="w-full md:w-5/12 bg-stone-50 p-8 flex flex-col border-r border-stone-100 overflow-y-auto">
                <div id="target-img-container" class="w-full aspect-square rounded-3xl bg-white overflow-hidden shadow-inner mb-6 border border-stone-200 flex items-center justify-center"></div>
                <div class="bg-white p-6 rounded-2xl border border-stone-100 space-y-4">
                    <h4 class="text-[10px] font-black uppercase text-stone-400 tracking-widest border-b pb-3 mb-2">Quy cách kỹ thuật</h4>
                    <div id="convention-info" class="grid grid-cols-2 gap-y-3 text-xs font-medium"></div>
                </div>
            </div>

            <!-- Cấu hình -->
            <div class="w-full md:w-7/12 flex flex-col overflow-hidden bg-white">
                <div class="p-6 border-b border-stone-100 flex justify-between items-center">
                    <div>
                        <h3 id="target-name" class="text-xl font-black text-stone-900 uppercase tracking-tight">Sản phẩm</h3>
                        <p class="text-[10px] font-bold text-orange-800 uppercase mt-1">Cấu hình kích thước & phụ kiện</p>
                    </div>
                    <button onclick="hideCustomizer()" class="w-10 h-10 rounded-full hover:bg-stone-100 text-stone-400 flex items-center justify-center transition-colors">
                        <i class="fas fa-times text-lg"></i>
                    </button>
                </div>

                <div class="flex-1 overflow-y-auto p-8 space-y-10 custom-scrollbar">
                    <!-- Kích thước -->
                    <section id="dims-box" class="space-y-8">
                        <div id="l-area">
                            <label class="block text-[10px] font-black uppercase text-stone-400 mb-3 tracking-widest">Chiều dài (cm)</label>
                            <div class="flex flex-wrap gap-2" id="l-list"></div>
                        </div>
                        <div id="w-area">
                            <label class="block text-[10px] font-black uppercase text-stone-400 mb-3 tracking-widest">Chiều rộng (cm)</label>
                            <div class="flex flex-wrap gap-2" id="w-list"></div>
                        </div>
                        <div id="d-area" class="hidden">
                            <label class="block text-[10px] font-black uppercase text-stone-400 mb-3 tracking-widest">Đường kính (cm)</label>
                            <div class="flex flex-wrap gap-2" id="d-list"></div>
                        </div>
                        <div id="t-area">
                            <label class="block text-[10px] font-black uppercase text-stone-400 mb-3 tracking-widest">Độ dày mặt gỗ (cm)</label>
                            <div class="flex flex-wrap gap-2" id="t-list"></div>
                        </div>
                    </section>

                    <!-- Chân bàn -->
                    <section id="leg-area">
                        <label class="block text-[10px] font-black uppercase text-stone-400 mb-3 tracking-widest flex items-center gap-2">
                            <i class="fas fa-hammer"></i> Lựa chọn chân bàn
                        </label>
                        <div id="leg-tabs" class="flex gap-2 mb-4 bg-stone-100 p-1 rounded-xl">
                            <button id="btn-iron" onclick="setLegType('iron')" class="flex-1 py-2 rounded-lg text-[10px] font-bold uppercase transition-all">Sắt</button>
                            <button id="btn-wood" onclick="setLegType('wood')" class="flex-1 py-2 rounded-lg text-[10px] font-bold uppercase transition-all">Gỗ</button>
                        </div>
                        <div class="grid grid-cols-2 gap-2" id="leg-list"></div>
                    </section>

                    <!-- Ghế -->
                    <section id="chair-area">
                        <label class="block text-[10px] font-black uppercase text-stone-400 mb-3 tracking-widest flex items-center gap-2">
                            <i class="fas fa-chair"></i> Ghế đi kèm
                        </label>
                        <div class="grid grid-cols-1 gap-2 mb-4" id="chair-list"></div>
                        <div class="bg-stone-50 p-5 rounded-2xl flex items-center justify-between border border-stone-100">
                            <span class="text-xs font-bold text-stone-500 uppercase">Số lượng:</span>
                            <div class="flex items-center gap-6 bg-white px-4 py-2 rounded-xl border border-stone-200">
                                <button onclick="changeQty(-1)" class="text-stone-400 hover:text-stone-900"><i class="fas fa-minus text-xs"></i></button>
                                <span id="qty-disp" class="font-black text-stone-900 w-6 text-center text-lg">0</span>
                                <button onclick="changeQty(1)" class="text-stone-400 hover:text-stone-900"><i class="fas fa-plus text-xs"></i></button>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="p-8 bg-stone-50 border-t border-stone-100 flex items-center justify-between">
                    <div>
                        <div id="price-total" class="text-3xl font-black text-stone-900 tracking-tighter">0đ</div>
                        <span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">Giá trọn bộ tạm tính</span>
                    </div>
                    <button onclick="addToCart()" class="bg-stone-900 text-white px-10 py-4 rounded-2xl font-black uppercase text-[11px] tracking-widest hover:bg-orange-950 transition-all shadow-xl active:scale-95">
                        Xác nhận đơn
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Giỏ hàng -->
    <div id="cart-overlay" class="fixed inset-0 z-[70] invisible transition-all duration-300">
        <div class="absolute inset-0 bg-stone-900/30 backdrop-blur-sm" onclick="closeCart()"></div>
        <div id="cart-sidebar" class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-white translate-x-full transition-transform duration-300 flex flex-col shadow-2xl">
            <div class="p-6 border-b border-stone-100 flex justify-between items-center bg-stone-50">
                <h3 class="font-black text-stone-900 uppercase">Giỏ hàng báo giá</h3>
                <button onclick="closeCart()" class="text-stone-400 hover:text-stone-900"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar"></div>
            <div class="p-8 border-t border-stone-100 bg-white">
                <div class="flex justify-between items-end mb-6">
                    <span class="text-stone-400 font-bold uppercase text-[10px]">Tổng thanh toán:</span>
                    <span id="grand-total" class="text-3xl font-black text-stone-900 tracking-tighter">0đ</span>
                </div>
                <button onclick="checkout()" class="w-full bg-[#0068ff] text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl flex items-center justify-center gap-3 active:scale-[0.98] transition-all">
                    <i class="fab fa-facebook-messenger text-lg"></i> Gửi báo giá qua Zalo
                </button>
            </div>
        </div>
    </div>

    <script>
        const getImg = (l) => {
            if(!l) return 'https://placehold.co/400x400?text=WOOD';
            const m = l.match(/d\/([^/?]+)/) || l.match(/id=([^&]+)/);
            return m ? `https://lh3.googleusercontent.com/d/${m[1]}` : l;
        };

        const DB = {
            tables: [
                { id: 1, name: "Bàn 4 người", p: 8500000, img: "https://drive.google.com/file/d/1obowOPy2zg-LdEimxObqDwhMHzyXqlRg/view", dims: { L: [120, 140], W: [60, 70], T: [5], H: 75, lt: "both" } },
                { id: 2, name: "Bàn 6 người", p: 9500000, img: "https://drive.google.com/file/d/1obowOPy2zg-LdEimxObqDwhMHzyXqlRg/view", dims: { L: [160, 180], W: [60, 70, 75, 80], T: [5, 7], H: 75, lt: "both" } },
                { id: 3, name: "Bàn 8 người", p: 10500000, img: "https://drive.google.com/file/d/1obowOPy2zg-LdEimxObqDwhMHzyXqlRg/view", dims: { L: [180, 200, 220], W: [70, 75, 80, 90], T: [5, 7], H: 75, lt: "both" } },
                { id: 4, name: "Bàn 10 người", p: 11500000, img: "https://drive.google.com/file/d/1obowOPy2zg-LdEimxObqDwhMHzyXqlRg/view", dims: { L: [220, 250], W: [80, 85, 90], T: [5, 7, 10], H: 75, lt: "both" } },
                { id: 5, name: "Mặt Bàn Cạnh Tự Nhiên", p: 0, img: "https://drive.google.com/file/d/1jqPatCSh5t0INYvgQuTP0zyUpBDOw5yy/view", dims: { L: [], W: [], T: [], H: 75, lt: "both" } },
                { id: 6, name: "Mặt Bàn Tròn", p: 6500000, img: "https://drive.google.com/file/d/1rd1ezTlTdGqgK-D8U8R9HqN8WwA_1x_p/view", dims: { D: [80, 110], T: [5], H: 75, lt: "fixed" } },
                { id: 7, name: "Bàn Cafe / Bar", p: 3500000, img: "https://drive.google.com/file/d/1rd1ezTlTdGqgK-D8U8R9HqN8WwA_1x_p/view", dims: { D: [60], L: [60], W: [60], H: 105, lt: "fixed" } },
                { id: 8, name: "Bàn Sofa", p: 4500000, img: "https://drive.google.com/file/d/1jqPatCSh5t0INYvgQuTP0zyUpBDOw5yy/view", dims: { L: [100], W: [50], T: [5], H: 50, lt: "specific", spec: ["Chân V", "Chân chữ T"] } },
                { id: 9, name: "Bàn Làm Việc", p: 6500000, img: "https://drive.google.com/file/d/1jqPatCSh5t0INYvgQuTP0zyUpBDOw5yy/view", dims: { L: [140, 160], W: [60, 70], T: [5], H: 75, lt: "specific", spec: ["Chân chữ T", "Chân khối lỗ tròn"] } }
            ],
            legs: {
                wood: [
                    { name: "Chân V", p: 1500000 }, { name: "Chân chữ Y", p: 1500000 },
                    { name: "Chân chữ T", p: 1500000 }, { name: "Chân 2X", p: 1500000 },
                    { name: "Chân U", p: 1500000 }, { name: "Chân khối lỗ tròn", p: 1500000 },
                    { name: "Chân cổ điển", p: 1500000 }, { name: "Chân thuyền", p: 1500000 }
                ],
                iron: [
                    { name: "Chân X sắt", p: 800000 }, { name: "Chân U sắt", p: 800000 },
                    { name: "Chân Côn sắt", p: 600000 }, { name: "Chân Hairpin", p: 400000 }
                ],
                fixed: [{ name: "Chân cố định", p: 0 }]
            },
            chairs: [
                { name: "Ghế Bella", p: 1200000 }, { name: "Ghế Đai Lớn", p: 1200000 },
                { name: "Ghế Đai Nhỏ", p: 1200000 }, { name: "Ghế Nan", p: 1200000 },
                { name: "Ghế ba Tiêu", p: 1200000 }, { name: "Ghế Đôn tròn", p: 600000 },
                { name: "Không lấy ghế", p: 0 }
            ]
        };

        let state = {
            target: null, lt: 'iron', leg: null, chair: DB.chairs[0], 
            qty: 0, l: null, w: null, t: null, d: null, cart: []
        };

        const nf = (n) => n === 0 ? "Liên hệ" : new Intl.NumberFormat('vi-VN').format(n) + 'đ';

        function init() {
            document.getElementById('table-catalog').innerHTML = DB.tables.map(t => `
                <div onclick="openEdit(${t.id})" class="group flex items-center gap-6 bg-white p-4 rounded-3xl border border-stone-100 cursor-pointer hover:shadow-xl hover:border-orange-200 transition-all duration-300">
                    <div class="w-20 h-20 rounded-2xl bg-stone-50 overflow-hidden shadow-inner flex-shrink-0">
                        <img src="${getImg(t.img)}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                    </div>
                    <div class="flex-1">
                        <h4 class="font-black text-stone-900 text-sm uppercase tracking-tight">${t.name}</h4>
                        <p class="text-[9px] text-stone-400 font-bold uppercase mt-1">Cấu hình linh hoạt</p>
                    </div>
                    <div class="text-right px-6 border-l border-stone-100">
                        <div class="text-sm font-black text-orange-950">${nf(t.p)}</div>
                        <div class="text-[8px] text-stone-300 font-bold uppercase tracking-widest mt-0.5">Giá gốc</div>
                    </div>
                </div>
            `).join('');
        }

        function openEdit(id) {
            const t = DB.tables.find(x => x.id === id);
            if(!t) return;
            
            state.target = t;
            state.l = (t.dims.L && t.dims.L.length) ? t.dims.L[0] : null;
            state.w = (t.dims.W && t.dims.W.length) ? t.dims.W[0] : null;
            state.t = (t.dims.T && t.dims.T.length) ? t.dims.T[0] : null;
            state.d = (t.dims.D && t.dims.D.length) ? t.dims.D[0] : null;
            
            const numMatch = t.name.match(/\d+/);
            state.qty = numMatch ? parseInt(numMatch[0]) : 0;
            if(id === 5) state.qty = 0;

            if (t.dims.lt === 'fixed') state.lt = 'fixed';
            else if (t.dims.lt === 'specific') state.lt = 'wood';
            else state.lt = 'iron';
            
            // Tìm chân mặc định
            if (t.dims.lt === 'specific') {
                state.leg = DB.legs.wood.find(l => t.dims.spec.includes(l.name)) || DB.legs.wood[0];
            } else {
                state.leg = DB.legs[state.lt][0];
            }

            document.getElementById('modal-overlay').classList.replace('invisible', 'visible');
            render();
        }

        function setLegType(type) {
            state.lt = type;
            state.leg = DB.legs[type][0];
            render();
        }

        function render() {
            const s = state; const d = s.target.dims;
            document.getElementById('target-name').innerText = s.target.name;
            document.getElementById('target-img-container').innerHTML = `<img src="${getImg(s.target.img)}" class="w-full h-full object-contain p-6">`;
            
            document.getElementById('convention-info').innerHTML = `
                <div class="text-stone-400">Chiều cao:</div><div class="text-right font-bold">${d.H}cm</div>
                <div class="text-stone-400">Loại chân:</div><div class="text-right font-black uppercase text-amber-800">${d.lt === 'both' ? 'Sắt/Gỗ' : (d.lt === 'fixed' ? 'Cố định' : 'Gỗ đặc thù')}</div>
            `;

            // Dim blocks
            const btn = (arr, sel, key) => arr.map(v => `<button onclick="state.${key}=${v}; render()" class="px-4 py-2 border-2 rounded-xl text-[11px] font-black transition-all ${sel==v?'selected-btn':'border-stone-100 text-stone-400'}">${v}</button>`).join('');
            
            // Toggle visibility logic
            document.getElementById('d-area').classList.toggle('hidden', !d.D);
            document.getElementById('l-area').classList.toggle('hidden', !d.L || d.L.length === 0);
            document.getElementById('w-area').classList.toggle('hidden', !d.W || d.W.length === 0);
            document.getElementById('t-area').classList.toggle('hidden', !d.T || d.T.length === 0);

            if(d.D) document.getElementById('d-list').innerHTML = btn(d.D, s.d, 'd');
            if(d.L) document.getElementById('l-list').innerHTML = btn(d.L, s.l, 'l');
            if(d.W) document.getElementById('w-list').innerHTML = btn(d.W, s.w, 'w');
            if(d.T) document.getElementById('t-list').innerHTML = btn(d.T, s.t, 't');

            // Legs selection
            const legArea = document.getElementById('leg-area');
            if(d.lt === 'fixed') {
                legArea.classList.add('hidden');
            } else {
                legArea.classList.remove('hidden');
                document.getElementById('leg-tabs').classList.toggle('hidden', d.lt !== 'both');
                
                // Style tabs
                document.getElementById('btn-iron').className = `flex-1 py-2 rounded-lg text-[10px] font-bold uppercase transition-all ${s.lt==='iron'?'bg-white text-stone-900 shadow-sm':'text-stone-400'}`;
                document.getElementById('btn-wood').className = `flex-1 py-2 rounded-lg text-[10px] font-bold uppercase transition-all ${s.lt==='wood'?'bg-white text-stone-900 shadow-sm':'text-stone-400'}`;
                
                let legsToShow = DB.legs[s.lt];
                if(d.lt === 'specific' && s.lt === 'wood') {
                    legsToShow = DB.legs.wood.filter(l => d.spec.includes(l.name));
                }

                document.getElementById('leg-list').innerHTML = legsToShow.map(l => `
                    <button onclick="state.leg=DB.legs['${s.lt}'].find(x=>x.name==='${l.name}'); render()" class="p-3 border-2 rounded-2xl text-center transition-all ${s.leg.name===l.name?'selected-btn':'border-stone-100 opacity-50'}">
                        <div class="text-[9px] font-black uppercase tracking-tighter">${l.name}</div>
                        <div class="text-[9px] font-bold mt-1 text-orange-900">+${nf(l.p)}</div>
                    </button>
                `).join('');
            }

            // Chairs
            document.getElementById('chair-list').innerHTML = DB.chairs.map(c => `
                <button onclick="state.chair=DB.chairs.find(x=>x.name==='${c.name}'); render()" class="p-4 border-2 rounded-2xl flex justify-between items-center transition-all ${s.chair.name===c.name?'selected-btn':'border-stone-100 opacity-50'}">
                    <span class="text-[10px] font-black uppercase tracking-tight">${c.name}</span>
                    <span class="text-[10px] font-bold">${nf(c.p)}</span>
                </button>
            `).join('');

            document.getElementById('qty-disp').innerText = s.qty;
            const total = s.target.p + (s.leg ? s.leg.p : 0) + (s.chair.p * s.qty);
            document.getElementById('price-total').innerText = s.target.p === 0 ? "Chờ báo giá" : nf(total);
            state.lastTotal = total;
        }

        function changeQty(v) { state.qty = Math.max(0, state.qty + v); render(); }
        function hideCustomizer() { document.getElementById('modal-overlay').classList.replace('visible', 'invisible'); }
        function openCart() { document.getElementById('cart-overlay').classList.remove('invisible'); document.getElementById('cart-sidebar').classList.remove('translate-x-full'); }
        function closeCart() { document.getElementById('cart-overlay').classList.add('invisible'); document.getElementById('cart-sidebar').classList.add('translate-x-full'); }

        function addToCart() {
            const s = state;
            let dimStr = "";
            if(s.target.dims.D) dimStr = `Đường kính ${s.d}`;
            else if(s.target.id === 5) dimStr = "Tự chọn phôi";
            else dimStr = `KT: ${s.l}x${s.w}`;
            
            if(s.t && s.target.id !== 5) dimStr += ` x Dày ${s.t}`;

            state.cart.push({
                id: Date.now(),
                name: s.target.name,
                conf: `${dimStr}cm | Chân: ${s.leg.name} | Ghế: ${s.qty}x ${s.chair.name}`,
                p: state.lastTotal,
                isL: s.target.p === 0
            });
            updateCart();
            hideCustomizer();
            openCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = state.cart.length;
            let grand = 0; let contact = false;
            document.getElementById('cart-items').innerHTML = state.cart.map(i => {
                if(!i.isL) grand += i.p; else contact = true;
                return `
                <div class="bg-stone-50 p-5 rounded-3xl border border-stone-100 relative group">
                    <button onclick="state.cart=state.cart.filter(x=>x.id!==${i.id}); updateCart()" class="absolute top-4 right-4 text-stone-300 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt text-xs"></i></button>
                    <h5 class="font-black text-xs uppercase text-stone-900">${i.name}</h5>
                    <p class="text-[9px] text-stone-400 font-bold uppercase mt-1 leading-relaxed">${i.conf}</p>
                    <div class="text-xs font-black text-stone-900 mt-4 pt-4 border-t border-stone-200/50">${i.isL ? "Liên hệ báo giá" : nf(i.p)}</div>
                </div>`;
            }).join('');
            document.getElementById('grand-total').innerText = nf(grand) + (contact ? " + Liên hệ" : "");
        }

        function checkout() {
            if(state.cart.length === 0) return;
            let msg = "ME TÂY STUDIO - YÊU CẦU BÁO GIÁ CHI TIẾT:\n";
            state.cart.forEach((i, idx) => { msg += `\n${idx+1}. ${i.name.toUpperCase()}\n- Cấu hình: ${i.conf}\n- Thành tiền: ${i.isL ? "Liên hệ" : nf(i.p)}\n`; });
