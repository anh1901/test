<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Tây Studio - Công cụ phối bộ chuyên nghiệp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9f8f6; }
        .btn-option { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; }
        .btn-option:hover { border-color: #d97706; }
        .selected { border-color: #92400e !important; background-color: #fffbeb !important; color: #92400e !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 10px; }
        .card-shadow { box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-slate-800">

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-stone-200">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-orange-900 rounded-lg flex items-center justify-center text-white">
                    <i class="fas fa-couch text-sm"></i>
                </div>
                <h1 class="font-black text-orange-900 tracking-tight uppercase">Me Tây Studio</h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="openCart()" class="relative p-2 text-stone-600 hover:text-orange-900">
                    <i class="fas fa-shopping-bag text-xl"></i>
                    <span id="cart-count" class="absolute top-0 right-0 bg-red-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- Left: Catalog -->
            <div class="w-full lg:w-1/2 space-y-6">
                <div>
                    <h2 class="text-lg font-bold text-stone-900 flex items-center gap-2">
                        <i class="fas fa-th-large text-orange-800"></i>
                        Chọn loại mặt bàn
                    </h2>
                    <p class="text-sm text-stone-500 mt-1">Khám phá các dòng sản phẩm gỗ Me Tây nguyên tấm</p>
                </div>

                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3" id="table-list">
                    <!-- Tables injected by JS -->
                </div>
            </div>

            <!-- Right: Customizer Area -->
            <div id="customizer" class="w-full lg:w-1/2 hidden">
                <div class="bg-white rounded-3xl p-6 border border-stone-200 card-shadow sticky top-24">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h3 id="selected-table-name" class="text-xl font-bold text-stone-900"></h3>
                            <p class="text-xs text-orange-700 font-semibold uppercase tracking-wider mt-1">Tùy chỉnh thông số</p>
                        </div>
                        <button onclick="closeCustomizer()" class="text-stone-300 hover:text-stone-500"><i class="fas fa-times"></i></button>
                    </div>

                    <div class="space-y-8 overflow-y-auto max-h-[60vh] pr-2 custom-scrollbar">
                        
                        <!-- 1. Size -->
                        <div>
                            <label class="block text-xs font-bold uppercase text-stone-400 mb-3">1. Quy cách (Dài x Rộng x Dày)</label>
                            <div id="size-options" class="grid grid-cols-2 gap-2"></div>
                        </div>

                        <!-- 2. Leg -->
                        <div id="leg-section">
                            <label class="block text-xs font-bold uppercase text-stone-400 mb-3">2. Mẫu chân bàn</label>
                            <div id="leg-options" class="space-y-4">
                                <!-- Logic groups injected by JS -->
                            </div>
                        </div>

                        <!-- 3. Chair -->
                        <div>
                            <label class="block text-xs font-bold uppercase text-stone-400 mb-3">3. Phối hợp ghế</label>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-2">
                                    <span class="text-[10px] text-stone-400 font-bold uppercase block">Gỗ Me Tây</span>
                                    <div id="chairs-metay" class="space-y-2"></div>
                                </div>
                                <div class="space-y-2">
                                    <span class="text-[10px] text-stone-400 font-bold uppercase block">Gỗ Cao Su</span>
                                    <div id="chairs-caosu" class="space-y-2"></div>
                                </div>
                            </div>

                            <div id="cushion-box" class="mt-4 p-4 bg-stone-50 rounded-2xl border border-stone-100 hidden">
                                <span class="text-[10px] text-stone-400 font-bold uppercase block mb-2">Tùy chọn nệm / gỗ:</span>
                                <div id="cushion-options" class="flex flex-wrap gap-2"></div>
                            </div>

                            <div class="flex items-center justify-between mt-4 bg-stone-50 p-4 rounded-2xl">
                                <span class="text-sm font-bold text-stone-700">Số lượng ghế:</span>
                                <div class="flex items-center gap-3 bg-white px-3 py-1 rounded-xl border border-stone-200">
                                    <button onclick="changeQty(-1)" class="w-6 h-6 text-stone-400 hover:text-orange-900">-</button>
                                    <span id="chair-qty" class="font-bold w-4 text-center">4</span>
                                    <button onclick="changeQty(1)" class="w-6 h-6 text-stone-400 hover:text-orange-900">+</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-8 pt-6 border-t border-stone-100">
                        <button onclick="addToCart()" class="w-full bg-orange-900 text-white py-4 rounded-2xl font-bold uppercase tracking-widest hover:bg-black transition-colors flex items-center justify-center gap-2">
                            <i class="fas fa-plus-circle"></i> Lưu vào đơn hàng
                        </button>
                    </div>
                </div>
            </div>

            <!-- Welcome Placeholder -->
            <div id="placeholder" class="w-full lg:w-1/2 flex items-center justify-center border-2 border-dashed border-stone-200 rounded-3xl min-h-[400px]">
                <div class="text-center p-8">
                    <div class="w-20 h-20 bg-stone-100 rounded-full flex items-center justify-center mx-auto mb-4 text-stone-300">
                        <i class="fas fa-mouse-pointer text-3xl"></i>
                    </div>
                    <p class="text-stone-400 font-medium">Chọn một loại bàn bên trái để bắt đầu phối bộ</p>
                </div>
            </div>

        </div>
    </main>

    <!-- Cart Overlay -->
    <div id="cart-drawer" class="fixed inset-0 z-50 invisible transition-all duration-300">
        <div class="absolute inset-0 bg-stone-900/40 backdrop-blur-sm" onclick="closeCart()"></div>
        <div class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-white shadow-2xl translate-x-full transition-transform duration-300" id="cart-content">
            <div class="flex flex-col h-full">
                <div class="p-6 border-b border-stone-100 flex items-center justify-between">
                    <h3 class="font-bold text-lg uppercase tracking-tight">Đơn hàng của bạn</h3>
                    <button onclick="closeCart()" class="p-2 hover:bg-stone-50 rounded-full"><i class="fas fa-times"></i></button>
                </div>
                <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
                    <!-- Cart items -->
                </div>
                <div class="p-6 bg-stone-50 border-t border-stone-200">
                    <button onclick="checkout()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold uppercase flex items-center justify-center gap-2 hover:bg-emerald-700 transition-colors">
                        <i class="fab fa-whatsapp"></i> Gửi qua Zalo
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data derived from provided spreadsheets
        const tables = [
            { id: 1, name: "Bàn 4 người", sizes: ["120x66x5", "140x70x5"], type: "standard" },
            { id: 2, name: "Bàn 6 người", sizes: ["160x60x5", "180x80x7"], type: "standard" },
            { id: 3, name: "Bàn 8 người", sizes: ["180x70x5", "220x90x7"], type: "standard" },
            { id: 4, name: "Bàn 10 người", sizes: ["220x80x5", "250x90x10"], type: "standard" },
            { id: 5, name: "Cạnh Tự Nhiên", sizes: ["160x70x5", "200x80x7", "250x90x10"], type: "standard" },
            { id: 6, name: "Mặt Bàn Tròn", sizes: ["D80x5", "D110x5"], type: "fixed" },
            { id: 7, name: "Bàn Bar/Cafe", sizes: ["60x60x5", "D60x5"], type: "fixed" },
            { id: 8, name: "Bàn Cafe thấp", sizes: ["D45x5", "D60x5"], type: "fixed" },
            { id: 9, name: "Bàn Sofa", sizes: ["100x50x50"], type: "sofa-tea" },
            { id: 10, name: "Bàn Trà", sizes: ["100x50x35"], type: "sofa-tea" },
            { id: 11, name: "Bàn Làm Việc", sizes: ["140x60", "140x70"], type: "work" }
        ];

        const legs = [
            { name: "Chân V", material: "Gỗ", category: ["standard", "sofa-tea"] },
            { name: "Chân chữ Y", material: "Gỗ", category: ["standard"] },
            { name: "Chân chữ T", material: "Gỗ", category: ["standard"] },
            { name: "Chân 2X", material: "Gỗ", category: ["standard"] },
            { name: "Chân U Gỗ", material: "Gỗ", category: ["standard"] },
            { name: "Chân khối lỗ tròn", material: "Gỗ", category: ["standard"] },
            { name: "Chân cổ điển", material: "Gỗ", category: ["standard"] },
            { name: "Chân U Sắt", material: "Sắt", category: ["standard"] },
            { name: "Chân Y Sắt", material: "Sắt", category: ["standard"] },
            { name: "Chân T Sắt", material: "Sắt", category: ["standard"] },
            { name: "Chân hình thang", material: "Sắt", category: ["standard", "sofa-tea", "work"] },
            { name: "Kèm hộc kéo", material: "Gỗ", category: ["work"] }
        ];

        const chairs = [
            { name: "Ghế Bella", wood: "Me Tây", options: ["Me gỗ", "Nệm đen", "Nệm cafe"] },
            { name: "Ghế Đai Lớn", wood: "Me Tây", options: ["Me gỗ", "Nệm đen", "Nệm cafe"] },
            { name: "Ghế Đai Nhỏ", wood: "Me Tây", options: ["Me gỗ"] },
            { name: "Ghế Nan", wood: "Me Tây", options: ["Me gỗ"] },
            { name: "Ghế 3 Tiêu", wood: "Me Tây", options: ["Me gỗ", "Nệm đen", "Nệm cafe"] },
            { name: "Ghế Đôn cao", wood: "Me Tây", options: ["Me gỗ", "Nệm đen", "Nệm cafe"] },
            { name: "Ghế Băng", wood: "Me Tây", options: ["Me gỗ 160", "Me gỗ 180", "Me gỗ 200"] },
            { name: "Ghế Bella (CS)", wood: "Cao Su", options: ["Da nâu", "Da kem", "Da xanh"] },
            { name: "Ghế Hiroshima", wood: "Cao Su", options: ["Da cafe", "Da đen"] },
            { name: "Ghế Bull", wood: "Cao Su", options: ["Da cafe", "Da đen"] },
            { name: "Ghế Nan (CS)", wood: "Cao Su", options: ["Gỗ"] }
        ];

        let state = {
            table: null,
            size: null,
            leg: null,
            chair: chairs[0],
            cushion: chairs[0].options[0],
            qty: 4,
            cart: []
        };

        function init() {
            renderTables();
            renderChairs();
        }

        function renderTables() {
            const container = document.getElementById('table-list');
            container.innerHTML = tables.map(t => `
                <button onclick="selectTable(${t.id})" class="btn-option bg-white p-4 rounded-2xl text-left border border-stone-200 card-shadow">
                    <span class="block text-stone-400 text-[10px] font-bold uppercase mb-1">Loại Bàn</span>
                    <span class="block text-stone-900 font-bold text-sm leading-tight">${t.name}</span>
                </button>
            `).join('');
        }

        function selectTable(id) {
            const t = tables.find(x => x.id === id);
            state.table = t;
            state.size = t.sizes[0];
            
            // Logic lọc chân bàn
            const filteredLegs = legs.filter(l => l.category.includes(t.type));
            state.leg = filteredLegs.length > 0 ? filteredLegs[0].name : "Chân theo bộ";

            // Logic số lượng ghế gợi ý
            if (t.name.includes("4 người")) state.qty = 4;
            else if (t.name.includes("6 người")) state.qty = 6;
            else if (t.name.includes("8 người")) state.qty = 8;
            else if (t.name.includes("10 người")) state.qty = 10;
            else state.qty = 2;

            document.getElementById('customizer').classList.remove('hidden');
            document.getElementById('placeholder').classList.add('hidden');
            updateUI();
        }

        function updateUI() {
            if (!state.table) return;

            document.getElementById('selected-table-name').innerText = state.table.name;
            
            // Size
            document.getElementById('size-options').innerHTML = state.table.sizes.map(s => `
                <button onclick="selectSize('${s}')" class="btn-option p-3 bg-stone-50 rounded-xl text-xs font-bold ${state.size === s ? 'selected' : ''}">${s}</button>
            `).join('');

            // Legs
            const legSection = document.getElementById('leg-section');
            const legContainer = document.getElementById('leg-options');
            
            if (state.table.type === 'fixed') {
                legContainer.innerHTML = `<div class="p-4 bg-orange-50 rounded-2xl border border-orange-100 text-xs text-orange-800 italic">Mẫu bàn này không hỗ trợ thay đổi chân tùy chọn.</div>`;
            } else {
                const woodLegs = legs.filter(l => l.category.includes(state.table.type) && l.material === 'Gỗ');
                const ironLegs = legs.filter(l => l.category.includes(state.table.type) && l.material === 'Sắt');

                let html = '';
                if (woodLegs.length) {
                    html += `<div class="space-y-2"><span class="text-[9px] font-bold text-stone-400 uppercase">Nhóm Chân Gỗ</span><div class="grid grid-cols-3 gap-2">`;
                    html += woodLegs.map(l => `<button onclick="selectLeg('${l.name}')" class="btn-option p-2 bg-stone-50 rounded-xl text-[10px] font-bold ${state.leg === l.name ? 'selected' : ''}">${l.name}</button>`).join('');
                    html += `</div></div>`;
                }
                if (ironLegs.length) {
                    html += `<div class="space-y-2"><span class="text-[9px] font-bold text-stone-400 uppercase">Nhóm Chân Sắt</span><div class="grid grid-cols-3 gap-2">`;
                    html += ironLegs.map(l => `<button onclick="selectLeg('${l.name}')" class="btn-option p-2 bg-stone-50 rounded-xl text-[10px] font-bold ${state.leg === l.name ? 'selected' : ''}">${l.name}</button>`).join('');
                    html += `</div></div>`;
                }
                legContainer.innerHTML = html;
            }

            // Chairs & Cushion
            const cBox = document.getElementById('cushion-box');
            if (state.chair && state.chair.options.length > 0) {
                cBox.classList.remove('hidden');
                document.getElementById('cushion-options').innerHTML = state.chair.options.map(o => `
                    <button onclick="selectCushion('${o}')" class="btn-option px-3 py-1 bg-white border border-stone-200 rounded-lg text-[10px] font-bold ${state.cushion === o ? 'selected' : ''}">${o}</button>
                `).join('');
            } else {
                cBox.classList.add('hidden');
            }

            document.getElementById('chair-qty').innerText = state.qty;
        }

        function renderChairs() {
            const meTay = document.getElementById('chairs-metay');
            const caoSu = document.getElementById('chairs-caosu');

            meTay.innerHTML = chairs.filter(c => c.wood === 'Me Tây').map(c => `
                <button onclick="selectChair('${c.name}')" class="btn-option w-full p-2 bg-stone-50 rounded-xl text-left text-[11px] font-bold ${state.chair.name === c.name ? 'selected' : ''}">${c.name}</button>
            `).join('');

            caoSu.innerHTML = chairs.filter(c => c.wood === 'Cao Su').map(c => `
                <button onclick="selectChair('${c.name}')" class="btn-option w-full p-2 bg-stone-50 rounded-xl text-left text-[11px] font-bold ${state.chair.name === c.name ? 'selected' : ''}">${c.name}</button>
            `).join('');
        }

        function selectSize(s) { state.size = s; updateUI(); }
        function selectLeg(l) { state.leg = l; updateUI(); }
        function selectChair(name) { 
            const c = chairs.find(x => x.name === name);
            state.chair = c;
            state.cushion = c.options[0];
            renderChairs();
            updateUI(); 
        }
        function selectCushion(o) { state.cushion = o; updateUI(); }
        function changeQty(v) { state.qty = Math.max(0, state.qty + v); updateUI(); }

        function addToCart() {
            state.cart.push({
                id: Date.now(),
                table: state.table.name,
                size: state.size,
                leg: state.leg,
                chair: state.chair.name,
                cushion: state.cushion,
                qty: state.qty
            });
            renderCart();
            openCart();
        }

        function renderCart() {
            document.getElementById('cart-count').innerText = state.cart.length;
            const container = document.getElementById('cart-items');
            if (state.cart.length === 0) {
                container.innerHTML = `<div class="text-center py-12"><i class="fas fa-shopping-basket text-4xl text-stone-100 mb-4 block"></i><p class="text-stone-400">Giỏ hàng trống</p></div>`;
                return;
            }
            container.innerHTML = state.cart.map(item => `
                <div class="bg-stone-50 p-4 rounded-2xl border border-stone-200 relative group">
                    <button onclick="removeItem(${item.id})" class="absolute -top-2 -right-2 w-6 h-6 bg-white shadow-md border border-stone-100 rounded-full text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fas fa-times text-[10px]"></i></button>
                    <div class="flex justify-between items-start mb-2">
                        <span class="font-bold text-stone-900">${item.table}</span>
                        <span class="text-[10px] bg-orange-100 text-orange-900 px-2 py-0.5 rounded-full font-bold">${item.size}</span>
                    </div>
                    <div class="text-[10px] text-stone-500 leading-relaxed">
                        <p><i class="fas fa-check-circle text-stone-300 mr-1"></i> Chân: ${item.leg}</p>
                        <p><i class="fas fa-check-circle text-stone-300 mr-1"></i> Ghế: ${item.qty} x ${item.chair} (${item.cushion})</p>
                    </div>
                </div>
            `).join('');
        }

        function removeItem(id) {
            state.cart = state.cart.filter(i => i.id !== id);
            renderCart();
        }

        function openCart() {
            document.getElementById('cart-drawer').classList.remove('invisible');
            document.getElementById('cart-content').classList.remove('translate-x-full');
        }

        function closeCart() {
            document.getElementById('cart-drawer').classList.add('invisible');
            document.getElementById('cart-content').classList.add('translate-x-full');
        }

        function closeCustomizer() {
            document.getElementById('customizer').classList.add('hidden');
            document.getElementById('placeholder').classList.remove('hidden');
        }

        function checkout() {
            if (state.cart.length === 0) return;
            let text = "Me Tây Studio - Đơn hàng phối bộ:\n";
            state.cart.forEach((i, idx) => {
                text += `\n${idx + 1}. Bàn: ${i.table} (${i.size})\n   - Chân: ${i.leg}\n   - Ghế: ${i.qty} cái ${i.chair} (${i.cushion})\n`;
            });
            const url = `https://zalo.me/0912345678?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }

        init();
    </script>
</body>
</html>
